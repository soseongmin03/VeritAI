<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VeritAI</title>
  <style>
    body { width: 250px; padding: 20px; font-family: sans-serif; text-align: center; background-color: black; color: white; margin: 0; }
    h3 { margin-top: 0; margin-bottom: 15px; color: lightskyblue; }
    p { font-size: 13px; color: lightgray; margin-top: 15px; font-weight: bold; }
    
    .toggle-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 10px; }
    .toggle-label { font-size: 14px; font-weight: bold; }
    
    .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: dimgrey; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: deepskyblue; }
    input:checked + .slider:before { transform: translateX(26px); }
    
    hr { border: 0; height: 1px; background: dimgray; margin: 15px 0; }
  </style>
</head>
<body>
  <h3>VeritAI 실시간 탐지</h3>
  
  <div class="toggle-container">
    <span class="toggle-label">시스템 전원</span>
    <label class="switch">
      <input type="checkbox" id="system-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <hr>

  <div class="toggle-container">
    <span class="toggle-label">자동 스캔 모드</span>
    <label class="switch">
      <input type="checkbox" id="auto-toggle">
      <span class="slider"></span>
    </label>
  </div>
  <p id="status-text">설정 로딩 중...</p>
  <script src="popup.js"></script>
</body>
</html>
